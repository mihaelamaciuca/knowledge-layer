name: Audit doc standards
on:
  pull_request:
    paths: ['docs/**']
  push:
    branches: [main]
    paths: ['docs/**']

permissions:
  contents: read

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install pyyaml
      - name: Governance scrub fixture test
        run: python3 scripts/scrub_test.py
      - run: python3 scripts/audit_docs_standards.py
      - name: Check for violations
        run: |
          python3 -c "
          import re, sys
          text = open('docs-standards-audit.md').read()
          m = re.search(r'Violating:\s+\*\*(\d+)\*\*', text)
          if not m:
              print('Could not parse violation count'); sys.exit(1)
          count = int(m.group(1))
          # The standing target is 0. Raise 'allowed' temporarily only when a
          # known, tracked exception lands; lower it back as exceptions close.
          allowed = 0
          if count > allowed:
              print(f'FAIL: {count} violations (allowed: {allowed})')
              sys.exit(1)
          print(f'OK: {count} violations (allowed: {allowed})')
          "
