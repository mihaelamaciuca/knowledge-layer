name: Sync docs to RAG index

on:
  push:
    branches: [main]
    paths:
      - "docs/**"

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 2 # need HEAD~1 for diff

      - name: Identify changed docs
        id: diff
        run: |
          CHANGED=$(git diff --name-only --diff-filter=AM HEAD~1 -- 'docs/*.md' 'docs/*.html' | tr '\n' ' ')
          DELETED=$(git diff --name-only --diff-filter=D HEAD~1 -- 'docs/*.md' 'docs/*.html' | tr '\n' ' ')
          echo "changed=$CHANGED" >> "$GITHUB_OUTPUT"
          echo "deleted=$DELETED" >> "$GITHUB_OUTPUT"
          echo "Changed/added: $CHANGED"
          echo "Deleted: $DELETED"

      - name: Set up Python
        if: steps.diff.outputs.changed != '' || steps.diff.outputs.deleted != ''
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        if: steps.diff.outputs.changed != '' || steps.diff.outputs.deleted != ''
        run: pip install psycopg2-binary openai pyyaml

      - name: Sync changed + deleted docs via rag_core
        if: steps.diff.outputs.changed != '' || steps.diff.outputs.deleted != ''
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GITHUB_SHA: ${{ github.sha }}
        run: |
          python3 scripts/sync_changed.py \
            --repo-prefix {{PROJECT_NAME}} \
            --git-sha "$GITHUB_SHA" \
            --changed "${{ steps.diff.outputs.changed }}" \
            --deleted "${{ steps.diff.outputs.deleted }}"

      # Rebuild the decisions table whenever a `*-dec-*.md` doc changes,
      # so `get_decision` and `get_impact_targets` stay current without a
      # manual reindex.
      - name: Detect changed decision docs
        id: dec
        if: steps.diff.outputs.changed != ''
        run: |
          DEC=$(echo "${{ steps.diff.outputs.changed }}" | tr ' ' '\n' | grep -E '/[0-9]{2}-dec-[a-z0-9-]+\.md$' || true)
          if [ -n "$DEC" ]; then echo "any=true" >> "$GITHUB_OUTPUT"; else echo "any=false" >> "$GITHUB_OUTPUT"; fi
          echo "Changed decision docs: $DEC"

      - name: Rebuild decision registry
        if: steps.dec.outputs.any == 'true'
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: python3 scripts/build_decision_registry.py
