name: Sync docs to RAG index

on:
  push:
    branches: [main]
    paths:
      - "docs/**"
  workflow_dispatch:  # manual trigger for testing

permissions:
  contents: read

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          # Fetch enough history to diff against HEAD~1 in the normal
          # case; on the very first commit there is no HEAD~1 and the
          # diff step falls back to "treat every doc as added".
          fetch-depth: 10

      - name: Check whether init.sh has been run
        # On the upstream template repo the {{PROJECT_NAME}} placeholder is
        # never substituted, so the sync step would always fail with an
        # intentional safety error. Detect that state and skip downstream
        # work cleanly so the CI badge stays green.
        id: init
        run: |
          if grep -q '{{PROJECT_NAME}}' scripts/populate.py 2>/dev/null; then
              echo "ready=false" >> "$GITHUB_OUTPUT"
              echo "Placeholder {{PROJECT_NAME}} still present. Skipping sync."
              echo "Run scripts/init.sh in your fork to enable the indexer."
          else
              echo "ready=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Identify changed docs
        if: steps.init.outputs.ready == 'true'
        id: diff
        # `docs/**` (recursive) is the trigger path; the diff filters
        # match both top-level files and any subdirectory the corpus
        # might grow into.
        run: |
          if git rev-parse --verify HEAD~1 >/dev/null 2>&1; then
              CHANGED=$(git diff --name-only --diff-filter=AM HEAD~1 -- 'docs/**' | grep -E '\.(md|html)$' | tr '\n' ' ' || true)
              DELETED=$(git diff --name-only --diff-filter=D HEAD~1 -- 'docs/**' | grep -E '\.(md|html)$' | tr '\n' ' ' || true)
          else
              echo "First commit: treating every doc as added."
              CHANGED=$(git ls-files 'docs/**' | grep -E '\.(md|html)$' | tr '\n' ' ' || true)
              DELETED=""
          fi
          echo "changed=$CHANGED" >> "$GITHUB_OUTPUT"
          echo "deleted=$DELETED" >> "$GITHUB_OUTPUT"
          echo "Changed/added: $CHANGED"
          echo "Deleted: $DELETED"

      - name: Set up Python
        if: steps.init.outputs.ready == 'true' && (steps.diff.outputs.changed != '' || steps.diff.outputs.deleted != '')
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        if: steps.init.outputs.ready == 'true' && (steps.diff.outputs.changed != '' || steps.diff.outputs.deleted != '')
        run: pip install psycopg2-binary openai pyyaml

      - name: Sync changed + deleted docs via rag_core
        if: steps.init.outputs.ready == 'true' && (steps.diff.outputs.changed != '' || steps.diff.outputs.deleted != '')
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GITHUB_SHA: ${{ github.sha }}
        run: |
          python3 scripts/sync_changed.py \
            --repo-prefix {{PROJECT_NAME}} \
            --git-sha "$GITHUB_SHA" \
            --changed "${{ steps.diff.outputs.changed }}" \
            --deleted "${{ steps.diff.outputs.deleted }}"

      # Rebuild the decisions table whenever a `*-dec-*.md` doc changes,
      # so `get_decision` and `get_impact_targets` stay current without a
      # manual reindex.
      - name: Detect changed decision docs
        id: dec
        if: steps.init.outputs.ready == 'true' && steps.diff.outputs.changed != ''
        run: |
          DEC=$(echo "${{ steps.diff.outputs.changed }}" | tr ' ' '\n' | grep -E '/[0-9]{2}-dec-[a-z0-9-]+\.md$' || true)
          if [ -n "$DEC" ]; then echo "any=true" >> "$GITHUB_OUTPUT"; else echo "any=false" >> "$GITHUB_OUTPUT"; fi
          echo "Changed decision docs: $DEC"

      - name: Rebuild decision registry
        if: steps.dec.outputs.any == 'true'
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: python3 scripts/build_decision_registry.py
